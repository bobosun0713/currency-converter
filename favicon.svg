<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
    <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#0ea5e9" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
    </defs>
    
    <!-- Right side (Top to Bottom-Right) -->
    <path d="M 60 20 A 40 40 0 0 1 100 60" fill="none" stroke="url(#grad)" stroke-width="14" stroke-linecap="round" />
    <path d="M 100 78 L 115 48 L 85 48 Z" fill="url(#grad)" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Left side (Bottom to Top-Left) -->
    <path d="M 60 100 A 40 40 0 0 1 20 60" fill="none" stroke="url(#grad)" stroke-width="14" stroke-linecap="round" />
    <path d="M 20 42 L 5 72 L 35 72 Z" fill="url(#grad)" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Dollar Sign -->
    <text x="60" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#grad)" text-anchor="middle">$</text>
</svg>
